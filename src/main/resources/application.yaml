server:
  port: 8080

spring:
  application:
    name: cinema

  # AI Configuration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.openai.com
      embedding:
        # Better semantic quality while keeping 1536 dims compatible with existing pgvector schema.
        model: text-embedding-3-small
        dimensions: 3072
    vectorstore:
      pgvector:
        initialize-schema: false   # Flyway manages schema
        dimensions: 3072
        distance-type: COSINE_DISTANCE
        index-type: HNSW

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/cinema_db
    username: cinema_user
    password: cinema_password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 50
      minimum-idle: 5
      idle-timeout: 300000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate # Let Flyway handle schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  # Redis Configuration
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # Email (SMTP) Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:quangkhanh1232004@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # File upload size limits
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# Cloudflare R2 Configuration (S3-compatible object storage)
r2:
  enabled: ${R2_ENABLED:true}
  endpoint: ${R2_ENDPOINT:https://335380d2400bebdfc2a8a6b719f842a7.r2.cloudflarestorage.com}
  access-key-id: ${R2_ACCESS_KEY_ID:ae8f322d79db36ed68639523145eba20}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:8b35565b12f84f7ee026e616094054f80911eef0773feac4b1ebb41fa9b18ec1}
  bucket-name: ${R2_BUCKET_NAME:cinema-media}
  region: ${R2_REGION:auto}
  public-url: ${R2_PUBLIC_URL:https://pub-465518e03b044f7bad8e5137e9c04351.r2.dev} # Optional: custom CDN domain

# JWT Configuration (Simplified)
jwt:
  secret: ${JWT_SECRET:Y2luZW1hLXNpbXBsZS1zZWNyZXQta2V5LWZvci1qd3Q=}
  expiration: 86400000 # 24 hours in milliseconds

# Application Configuration (Simplified)
app:
  name: Cinema Management System - University Project
  version: 1.0.0
  ai:
    auto-generate-movie-embedding-on-create: true
    auto-generate-movie-embedding-on-update: true
    embedding-async: true
    seed-movie-embeddings-on-startup: false
    batch-embedding-delay-ms: 250
    similar-movie-primary-threshold: 0.72
    similar-movie-fallback-threshold: 0.56
    personalized-primary-threshold: 0.72
    personalized-fallback-threshold: 0.56
    semantic-primary-threshold: 0.68
    semantic-fallback-threshold: 0.50
    recommendation-candidate-multiplier: 3

# Logging Configuration
logging:
  level:
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    com.example.cinema: DEBUG
  pattern:
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
